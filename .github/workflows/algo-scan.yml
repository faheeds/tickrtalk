name: Algo Scan (every 15 min, market hours)

# Runs every 15 minutes Mon–Fri, 9:00 AM – 4:00 PM ET (= 13:00–20:00 UTC)
# GitHub Actions uses UTC; ET = UTC-4 (EDT) / UTC-5 (EST).
# The route itself gates on Alpaca's getClock().isOpen, so EST/EDT drift is harmless.
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch: # allow manual trigger from the GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Trigger algo scan
        run: |
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://tickrtalk-ebon.vercel.app/api/cron/scan")
          BODY=$(cat /tmp/body.txt)
          echo "HTTP $STATUS — $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Scan endpoint returned HTTP $STATUS"
            exit 1
          fi
